<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #ruby-switch { display: none; }

        #ruby-switch:not(:checked) ~ p ruby rt {
            display: none;
        }

        label[for="ruby-switch"] {
            display: inline-block;
                width: 48px;
                height: 24px;
                background: #ccc;
                border-radius: 12px;
                cursor: pointer;
                position: relative;
            }

            /* つまみ */
            label[for="ruby-switch"]::after {
                content: '';
                position: absolute;
                width: 20px;
                height: 20px;
                background: white;
                border-radius: 50%;
                top: 2px;
                left: 2px;
                transition: left 0.2s;
            }

            /* ON状態 */
            #ruby-switch:checked + label[for="ruby-switch"] {
                background: #1e3a8a;
            }
            #ruby-switch:checked + label[for="ruby-switch"]::after {
                left: 26px;
            }
</style>
</head>
<body>
    <input type="checkbox" id="ruby-switch" checked>
    <label for="ruby-switch"></label>
    <span>ふりがな</span>
  <p>
    <ruby>障害者<rt>しょうがいしゃ</rt></ruby>の
    <ruby>声<rt>こえ</rt></ruby>
  </p>

<script>
        const rubySwitch = document.getElementById('ruby-switch')

        switchLog = localStorage.getItem('ruby')

        if (switchLog === 'off') {
            rubySwitch.checked = false
        }

        rubySwitch.addEventListener('change', () => {
            if (rubySwitch.checked) {
                localStorage.setItem('ruby','on')
            } else {
                localStorage.setItem('ruby', 'off')
            }
        })
</script>
</body>
</html>
